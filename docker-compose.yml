services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: modular_media_app_php
    working_dir: /var/www/html
    volumes:
      - ./app-main:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: modular_media_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app-main:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: modular_media_app_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: modular_media
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "33060:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: