services:
  db:
    image: mysql:8.0
    container_name: modular_media_app_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: modular_media
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "33060:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app_catalog:
    profiles: ["catalog", "all"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_VARIANT: composer.catalog.json
    container_name: modular_media_app_catalog
    working_dir: /var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: modular_media
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      NGINX_TEMPLATE: catalog
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

  app_campaigns:
    profiles: ["campaigns", "all"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_VARIANT: composer.campaigns.json
    container_name: modular_media_app_campaigns
    working_dir: /var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: modular_media
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      NGINX_TEMPLATE: campaigns
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy

  queue_campaigns:
    profiles: ["campaigns", "all"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_VARIANT: composer.campaigns.json
    container_name: modular_media_queue_campaigns
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: modular_media
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      db:
        condition: service_healthy

  app_full:
    profiles: ["full", "all"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_VARIANT: composer.full.json
    container_name: modular_media_app_full
    working_dir: /var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: modular_media
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      NGINX_TEMPLATE: full
    ports:
      - "8083:80"
    depends_on:
      db:
        condition: service_healthy

  queue_full:
    profiles: ["full", "all"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_VARIANT: composer.full.json
    container_name: modular_media_queue_full
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: modular_media
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
